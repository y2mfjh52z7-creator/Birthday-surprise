<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One More Step ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="moon"></div>

<div class="card">

<h1>🔐 One More Step</h1>

<p>
Before you continue...

Answer this little question.

❤️

When did we first meet?
</p>

<input
id="password"
type="text"
placeholder="Example: 28 December 2025"
style="padding:15px;border-radius:10px;border:none;width:80%;font-size:18px;text-align:center;">

<br><br>

<button onclick="checkPassword()">
Continue ❤️
</button>

<p id="result"></p>

</div>

<script>

function checkPassword(){

let answer=document.getElementById("password").value.toLowerCase().trim();

if(
answer==="28 december 2025" ||
answer==="28 dec 2025"
){

window.location.href="letter.html";

}else{

document.getElementById("result").innerHTML="❌ That's not the answer ❤️";

}

}

</script>

<script src="script.js"></script>

</body>
</html>

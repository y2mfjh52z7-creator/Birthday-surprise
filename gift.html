<!DOCTYPE html>
<html>
<head>
    <title>A Special Gift 🎁</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="gift-page">
        <h1>A little surprise for you ❤️</h1>

        <div class="gift-box" onclick="openGift()">
            🎁
        </div>

        <p id="message">Click the gift box 💝</p>

        <a id="nextButton" href="birthday.html" style="display:none;">
            Continue ❤️
        </a>
    </div>

<script>
function openGift(){
    let gift = document.querySelector(".gift-box");

    gift.classList.add("open");
    gift.innerHTML = "💝";

    document.getElementById("message").innerHTML =
    "Inside this gift is a piece of my heart ❤️<br>Every moment with you is precious.";

    document.getElementById("nextButton").style.display = "inline-block";
}

<!DOCTYPE html>
<html>

<head>
    <title>Happy Birthday ❤️</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ffb6d9, #ffe6f0);
            height: 100vh;
            overflow: hidden;
            padding-top: 80px;
        }

        h1 {
            font-size: 45px;
            color: #ff3366;
        }

        .cake {
            font-size: 120px;
            margin-top: 40px;
            animation: bounce 1.5s infinite;
        }

        p {
            font-size: 22px;
            color: #444;
            padding: 20px;
        }

        @keyframes bounce {
            0%,100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }
    </style>

</head>


<body>

<h1>Happy Birthday ❤️🎂</h1>

<div class="cake">🎂</div>

<p>
    Today is all about you ❤️<br>
    I hope your day is filled with happiness, smiles, and beautiful moments.
</p>


</body>

</html>

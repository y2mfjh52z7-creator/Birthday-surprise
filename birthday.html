<!DOCTYPE html>
<html>

<head>
    <title>Happy Birthday ❤️</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ffb6d9, #ffe6f0);
            height: 100vh;
            overflow: hidden;
            padding-top: 80px;
        }

        h1 {
            font-size: 45px;
            color: #ff3366;
        }

        .cake {
            font-size: 120px;
            margin-top: 40px;
            animation: bounce 1.5s infinite;
        }

        p {
            font-size: 22px;
            color: #444;
            padding: 20px;
        }

        @keyframes bounce {
            0%,100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }
        .hearts {
    font-size: 35px;
    margin-top: 30px;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.2);
    }

    100% {
        transform: scale(1);
    }
}
        .final-message {
    margin-top: 50px;
    font-size: 28px;
    color: #ff3366;
    opacity: 0;
    animation: appear 3s forwards;
    animation-delay: 2s;
}
<div class="confetti">❤️</div>
<div class="confetti">💖</div>
<div class="confetti">💕</div>
<div class="confetti">✨</div>
@keyframes appear {
    from {
        opacity: 0;
        transform: translateY(30px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}
        .confetti {
    position: absolute;
    top: -10%;
    font-size: 25px;
    animation: fall 6s linear infinite;
}

.confetti:nth-child(1) {
    left: 10%;
}

.confetti:nth-child(2) {
    left: 40%;
    animation-delay: 2s;
}

.confetti:nth-child(3) {
    left: 70%;
    animation-delay: 4s;
}

.confetti:nth-child(4) {
    left: 90%;
    animation-delay: 1s;
}

@keyframes fall {
    from {
        transform: translateY(0) rotate(0deg);
    }

    to {
        transform: translateY(110vh) rotate(360deg);
    }
}
    </style>

</head>


<body>

<h1>Happy Birthday ❤️🎂</h1>

<div class="cake">🎂</div>

<p>
    Happy Birthday to the most special person in my life ❤️<br><br>

    I hope your day is as beautiful as your smile.<br>
    Thank you for bringing happiness and love into my life.<br><br>

    You deserve all the happiness in the world ❤️
<div class="final-message">
    I love you forever and ever and ever and ever ❤️
</div>


</body>

</html>

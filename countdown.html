<!DOCTYPE html>
<html>

<head>
    <title>Countdown ❤️</title>

    <style>
        body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #1a001f, #4d0039);
    color: white;
    height: 100vh;
    overflow: hidden;
    padding-top: 100px;
}

h1 {
    font-size: 40px;
    color: #ffb6d9;
    text-shadow: 0 0 15px #ff69b4;
}

#countdown {
    font-size: 35px;
    margin-top: 50px;
    color: white;
    text-shadow: 0 0 10px #ff69b4;
}

.heart {
    position: absolute;
    font-size: 25px;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    0% {
        top: -10%;
        transform: rotate(0deg);
    }

    100% {
        top: 110%;
        transform: rotate(360deg);
    }
}
    </style>

</head>

<body>

    <h1>A special day is coming... ❤️</h1>

    <h2 id="countdown"></h2>
<div class="heart">❤️</div>
<div class="heart">💗</div>
<div class="heart">💖</div>

<script>

let birthday = new Date("2026-09-23T00:00:00+01:00").getTime();


let timer = setInterval(function(){

    let now = new Date().getTime();

    let distance = birthday - now;


    let days = Math.floor(distance / (1000 * 60 * 60 * 24));

    let hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) /
        (1000 * 60 * 60)
    );

    let minutes = Math.floor(
        (distance % (1000 * 60 * 60)) /
        (1000 * 60)
    );

    let seconds = Math.floor(
        (distance % (1000 * 60)) / 1000
    );


    document.getElementById("countdown").innerHTML =
    days + " Days " +
    hours + " Hours " +
    minutes + " Minutes " +
    seconds + " Seconds";


},1000);


</script>

</body>

</html>
